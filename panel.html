<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div id="toolbar">
    <div class="tb-group">
      <button id="btn-add-h" title="Add Horizontal Guide">+ H</button>
      <button id="btn-add-v" title="Add Vertical Guide">+ V</button>
      <button id="btn-add-box" title="Add Measurement Box">+ Box</button>
    </div>
    <div class="tb-divider"></div>
    <div class="tb-group">
      <button id="btn-box-model">Box Model</button>
    </div>
    <div class="tb-divider"></div>
    <div class="tb-group">
      <label class="toggle-switch" title="Show/hide rulers">
        <span class="toggle-label">Rulers</span>
        <input type="checkbox" id="chk-rulers">
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </label>
      <button id="btn-crosshair">Crosshair</button>
    </div>
    <button id="btn-clear-all">Clear All</button>
  </div>
  <div id="guides-section" class="list-section">
    <div class="section-header">
      <span class="section-title">GUIDES</span>
      <span class="section-count" id="guides-count"></span>
    </div>
    <div id="guide-list"></div>
  </div>
  <div id="boxes-section" class="list-section">
    <div class="section-header">
      <span class="section-title">BOXES</span>
      <span class="section-count" id="boxes-count"></span>
    </div>
    <div id="box-list"></div>
  </div>
  <script src="panel.js"></script>
</body>
</html>
